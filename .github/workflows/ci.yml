# =============================================================================
# .github/workflows/ci.yml
# =============================================================================
# GitHub Actions CI/CD pipeline.
#
# GitHub Actions vs GitLab CI — conceptually identical, different syntax:
#   GitLab: .gitlab-ci.yml with "stages" and "jobs"
#   GitHub: .github/workflows/*.yml with "jobs" and "steps"
#
# Trigger: runs on every push and on pull requests.
#
# JOBS (run in parallel where possible):
#   test-unit        → Unit tests (no Docker needed)
#   test-integration → Integration tests (Postgres via GitHub Service Container)
#   test-e2e         → E2E tests
#   lint             → Code quality checks
#   build            → Build & push Docker images (main branch only)
#   deploy           → Helm upgrade on K8s (main branch only, after build)
# =============================================================================

name: Argus CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Prevents multiple pipelines from deploying to the same branch simultaneously
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# =============================================================================
# SHARED DEFAULTS
# =============================================================================

defaults:
  run:
    working-directory: services/backend

env:
  REGISTRY: ghcr.io  # GitHub Container Registry
  IMAGE_NAME: ${{ github.repository }}  # e.g. "felixbe/argus"

# =============================================================================
# JOBS
# =============================================================================

jobs:

  # ---------------------------------------------------------------------------
  # UNIT TESTS
  # Runs without Docker — very fast (~30s)
  # ---------------------------------------------------------------------------
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: services/backend/requirements*.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-test.txt

      - name: Run unit tests
        run: pytest tests/unit -m unit -v --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: services/backend/coverage.xml
          flags: unit
          # Sign up at codecov.io — shows coverage % directly in GitHub PRs

  # ---------------------------------------------------------------------------
  # INTEGRATION TESTS
  # Uses GitHub "Service Containers" — starts a real Postgres alongside the job
  # No testcontainers needed — GitHub handles this natively
  # ---------------------------------------------------------------------------
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest

    # Service containers: run as Docker containers alongside the job
    # The job can reach them via localhost
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: argus_test
          POSTGRES_USER: argus
          POSTGRES_PASSWORD: argus-test-password
        ports:
          - 5432:5432
        # Wait until Postgres is ready before starting tests
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # These env vars are read by pydantic-settings (our config class)
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: argus_test
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: argus-test-password
      ENVIRONMENT: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: services/backend/requirements*.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-test.txt

      - name: Run integration tests
        run: pytest tests/integration -m integration -v --cov-fail-under=0

  # ---------------------------------------------------------------------------
  # E2E TESTS
  # ---------------------------------------------------------------------------
  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: services/backend/requirements*.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-test.txt

      - name: Run E2E tests
        run: pytest tests/e2e -m e2e -v --cov-fail-under=0

  # ---------------------------------------------------------------------------
  # LINTING
  # Runs in parallel with tests — does not block them
  # ---------------------------------------------------------------------------
  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check app/

      - name: Check formatting
        run: ruff format app/ --check
        # Fails if code is not properly formatted
        # Developers must run `ruff format app/` locally

  # ---------------------------------------------------------------------------
  # BUILD DOCKER IMAGES
  # Only on main branch, only when all tests pass
  # ---------------------------------------------------------------------------
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration, test-e2e, lint]
    # Only on main branch (not on pull requests)
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: .  # Override — build from repo root

    permissions:
      contents: read
      packages: write  # Required to push to GitHub Container Registry

    strategy:
      matrix:
        # Build both services in parallel
        service: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          # GITHUB_TOKEN is automatically available — no manual secret needed

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}
          tags: |
            # Tag with git commit hash (e.g. "sha-a1b2c3d")
            type=sha,prefix=sha-
            # Tag "latest" for main branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # Tag with version number when a git tag is set (e.g. "v1.2.0")
            type=semver,pattern={{version}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache: uses GitHub Actions Cache for faster builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # DEPLOY TO STAGING
  # Automatically after every successful build on main
  # ---------------------------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: .
    environment:
      name: staging
      url: https://argus-staging.your-domain.com

    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.16.0"

      - name: Configure kubectl
        # KUBE_CONFIG is a base64-encoded kubeconfig — stored in GitHub Secrets
        # Settings → Secrets and variables → Actions → New repository secret
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > ~/.kube/config

      - name: Deploy with Helm
        run: |
          helm upgrade --install argus ./charts/argus \
            --namespace argus \
            --create-namespace \
            --set backend.image.tag=sha-${{ github.sha }} \
            --set frontend.image.tag=sha-${{ github.sha }} \
            --set global.imageRegistry=ghcr.io/${{ github.repository_owner }}/argus/ \
            --atomic \
            --timeout 5m

  # ---------------------------------------------------------------------------
  # DEPLOY TO PRODUCTION
  # Manually triggered — only via GitHub UI or when a git tag is pushed
  # ---------------------------------------------------------------------------
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    defaults:
      run:
        working-directory: .
    environment:
      name: production
      url: https://argus.your-domain.com
      # Configure "Required reviewers" in GitHub Environment Settings
      # → someone must manually approve the deploy

    # Only when a version tag is pushed (e.g. git tag v1.0.0 && git push --tags)
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: "3.16.0"

      - name: Configure kubectl (Production)
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > ~/.kube/config

      - name: Deploy to Production
        run: |
          helm upgrade --install argus ./charts/argus \
            --namespace argus \
            -f charts/argus/values-prod.yaml \
            --set backend.image.tag=${{ github.ref_name }} \
            --set frontend.image.tag=${{ github.ref_name }} \
            --atomic \
            --timeout 10m
