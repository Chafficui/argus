# =============================================================================
# .github/workflows/ci.yml
# =============================================================================
# GitHub Actions CI/CD pipeline.
#
# JOBS (run in parallel where possible):
#   test-unit        → Backend unit tests (no Docker needed)
#   test-integration → Backend integration tests (Postgres via Service Container)
#   test-e2e         → Backend E2E tests
#   test-crawler     → Crawler unit tests
#   test-frontend    → Frontend type check + ESLint
#   lint             → Backend code quality (ruff)
#   build            → Build & push Docker images (main branch only)
#   deploy-staging   → Helm upgrade on K8s staging (requires DEPLOY_ENABLED)
#   deploy-prod      → Helm upgrade on K8s production (requires DEPLOY_ENABLED)
# =============================================================================

name: Argus CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# =============================================================================
# SHARED DEFAULTS
# =============================================================================

defaults:
  run:
    working-directory: services/backend

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# =============================================================================
# JOBS
# =============================================================================

jobs:

  # ---------------------------------------------------------------------------
  # UNIT TESTS
  # ---------------------------------------------------------------------------
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: services/backend/requirements*.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-test.txt

      - name: Run unit tests
        run: pytest tests/unit -m unit -v --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: codecov/codecov-action@v5
        with:
          file: services/backend/coverage.xml
          flags: unit

  # ---------------------------------------------------------------------------
  # INTEGRATION TESTS
  # ---------------------------------------------------------------------------
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: argus_test
          POSTGRES_USER: argus
          POSTGRES_PASSWORD: argus-test-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: argus_test
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: argus-test-password
      ENVIRONMENT: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: services/backend/requirements*.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-test.txt

      - name: Run integration tests
        run: pytest tests/integration -m integration -v --cov-fail-under=0

  # ---------------------------------------------------------------------------
  # E2E TESTS
  # ---------------------------------------------------------------------------
  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: services/backend/requirements*.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-test.txt

      - name: Run E2E tests
        run: pytest tests/e2e -m e2e -v --cov-fail-under=0

  # ---------------------------------------------------------------------------
  # CRAWLER UNIT TESTS
  # ---------------------------------------------------------------------------
  test-crawler-unit:
    name: Crawler Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/crawler

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: services/crawler/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio pytest-mock

      - name: Run crawler unit tests
        run: pytest tests/unit -m unit -v

  # ---------------------------------------------------------------------------
  # FRONTEND TYPE CHECK & LINT
  # ---------------------------------------------------------------------------
  test-frontend:
    name: Frontend Type Check & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint src/

  # ---------------------------------------------------------------------------
  # BACKEND LINTING
  # ---------------------------------------------------------------------------
  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check app/

      - name: Check formatting
        run: ruff format app/ --check

  # ---------------------------------------------------------------------------
  # BUILD DOCKER IMAGES
  # Only on main branch, only when all tests pass
  # ---------------------------------------------------------------------------
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration, test-e2e, test-crawler-unit, test-frontend, lint]
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: .

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service: [backend, frontend, crawler]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # DEPLOY TO STAGING
  # Requires: DEPLOY_ENABLED variable set to 'true' in GitHub repo settings,
  # and KUBE_CONFIG_STAGING secret with base64-encoded kubeconfig.
  # ---------------------------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build]
    if: vars.DEPLOY_ENABLED == 'true'
    defaults:
      run:
        working-directory: .
    environment:
      name: staging
      url: https://argus.codai.app

    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.16.0"

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy with Helm
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          helm dependency update ./charts/argus
          helm upgrade --install argus ./charts/argus \
            --namespace argus \
            --create-namespace \
            -f charts/argus/values-staging.yaml \
            --set backend.image.tag=sha-${SHORT_SHA} \
            --set frontend.image.tag=sha-${SHORT_SHA} \
            --set crawler.image.tag=sha-${SHORT_SHA} \
            --set keycloak.auth.adminPassword=${{ secrets.KEYCLOAK_ADMIN_PASSWORD }} \
            --atomic \
            --timeout 10m

  # ---------------------------------------------------------------------------
  # DEPLOY TO PRODUCTION
  # Requires: DEPLOY_ENABLED variable set to 'true' in GitHub repo settings,
  # and KUBE_CONFIG_PROD secret with base64-encoded kubeconfig.
  # Configure "Required reviewers" in GitHub Environment Settings for manual approval.
  # ---------------------------------------------------------------------------
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: vars.DEPLOY_ENABLED == 'true'
    defaults:
      run:
        working-directory: .
    environment:
      name: production
      url: https://argus.codai.app

    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: "3.16.0"

      - name: Configure kubectl (Production)
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > ~/.kube/config

      - name: Deploy to Production
        run: |
          helm upgrade --install argus ./charts/argus \
            --namespace argus \
            -f charts/argus/values-prod.yaml \
            --set backend.image.tag=${{ github.ref_name }} \
            --set frontend.image.tag=${{ github.ref_name }} \
            --atomic \
            --timeout 10m
