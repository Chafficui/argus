# =============================================================================
# .github/workflows/ci.yml
# =============================================================================
# GitHub Actions CI/CD pipeline.
#
# GitHub Actions vs GitLab CI — konzeptionell identisch, andere Syntax:
#   GitLab: .gitlab-ci.yml mit "stages" und "jobs"
#   GitHub: .github/workflows/*.yml mit "jobs" und "steps"
#
# Trigger: läuft bei jedem Push und bei Pull Requests.
#
# JOBS (laufen parallel wo möglich):
#   test-unit        → Unit Tests (kein Docker nötig)
#   test-integration → Integration Tests (Postgres via GitHub Service Container)
#   test-e2e         → E2E Tests
#   lint             → Code-Qualität prüfen
#   build            → Docker Images bauen & pushen (nur auf main)
#   deploy           → Helm upgrade auf K8s (nur auf main, nach build)
# =============================================================================

name: Argus CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Verhindert dass mehrere Pipelines gleichzeitig auf denselben Branch deployen
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# =============================================================================
# SHARED DEFAULTS
# =============================================================================

defaults:
  run:
    working-directory: services/backend

env:
  REGISTRY: ghcr.io  # GitHub Container Registry
  IMAGE_NAME: ${{ github.repository }}  # z.B. "felixbe/argus"

# =============================================================================
# JOBS
# =============================================================================

jobs:

  # ---------------------------------------------------------------------------
  # UNIT TESTS
  # Läuft ohne Docker — sehr schnell (~30s)
  # ---------------------------------------------------------------------------
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: services/backend/requirements*.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-test.txt

      - name: Run unit tests
        run: pytest tests/unit -m unit -v --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: services/backend/coverage.xml
          flags: unit
          # Sign up at codecov.io — zeigt Coverage-% direkt in GitHub PRs an

  # ---------------------------------------------------------------------------
  # INTEGRATION TESTS
  # Nutzt GitHub "Service Containers" — startet echten Postgres neben dem Job
  # Kein testcontainers nötig — GitHub macht das nativ
  # ---------------------------------------------------------------------------
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest

    # Service containers: laufen als Docker-Container neben dem Job
    # Der Job kann sie über localhost erreichen
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: argus_test
          POSTGRES_USER: argus
          POSTGRES_PASSWORD: argus-test-password
        ports:
          - 5432:5432
        # Warte bis Postgres bereit ist bevor Tests starten
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Diese Env-Vars werden von pydantic-settings gelesen (unsere Config-Klasse)
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: argus_test
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: argus-test-password
      ENVIRONMENT: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: services/backend/requirements*.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-test.txt

      - name: Run integration tests
        run: pytest tests/integration -m integration -v

  # ---------------------------------------------------------------------------
  # E2E TESTS
  # ---------------------------------------------------------------------------
  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: services/backend/requirements*.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-test.txt

      - name: Run E2E tests
        run: pytest tests/e2e -m e2e -v

  # ---------------------------------------------------------------------------
  # LINTING
  # Läuft parallel zu den Tests — blockiert sie nicht
  # ---------------------------------------------------------------------------
  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check app/

      - name: Check formatting
        run: ruff format app/ --check
        # Schlägt fehl wenn Code nicht korrekt formatiert ist
        # Entwickler müssen lokal `ruff format app/` ausführen

  # ---------------------------------------------------------------------------
  # BUILD DOCKER IMAGES
  # Nur auf main-Branch, nur wenn alle Tests grün sind
  # ---------------------------------------------------------------------------
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration, test-e2e, lint]
    # Nur auf main-Branch (nicht bei Pull Requests)
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: .  # Override — build vom Repo-Root aus

    permissions:
      contents: read
      packages: write  # Nötig um in GitHub Container Registry zu pushen

    strategy:
      matrix:
        # Beide Services parallel bauen
        service: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          # GITHUB_TOKEN ist automatisch verfügbar — kein manuelles Secret nötig

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}
          tags: |
            # Tag mit Git-Commit-Hash (z.B. "sha-a1b2c3d")
            type=sha,prefix=sha-
            # Tag "latest" für main-Branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # Tag mit Versionsnummer wenn ein Git-Tag gesetzt wird (z.B. "v1.2.0")
            type=semver,pattern={{version}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache: nutzt GitHub Actions Cache für schnellere Builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # DEPLOY TO STAGING
  # Automatisch nach jedem erfolgreichen Build auf main
  # ---------------------------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: .
    environment:
      name: staging
      url: https://argus-staging.your-domain.com

    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.16.0"

      - name: Configure kubectl
        # KUBE_CONFIG ist ein Base64-enkodierter kubeconfig — in GitHub Secrets gespeichert
        # Settings → Secrets and variables → Actions → New repository secret
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > ~/.kube/config

      - name: Deploy with Helm
        run: |
          helm upgrade --install argus ./charts/argus \
            --namespace argus \
            --create-namespace \
            --set backend.image.tag=sha-${{ github.sha }} \
            --set frontend.image.tag=sha-${{ github.sha }} \
            --set global.imageRegistry=ghcr.io/${{ github.repository_owner }}/argus/ \
            --atomic \
            --timeout 5m

  # ---------------------------------------------------------------------------
  # DEPLOY TO PRODUCTION
  # Manuell ausgelöst — nur über GitHub UI oder bei einem Git-Tag
  # ---------------------------------------------------------------------------
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    defaults:
      run:
        working-directory: .
    environment:
      name: production
      url: https://argus.your-domain.com
      # "Required reviewers" in GitHub Environment Settings konfigurieren
      # → jemand muss den Deploy manuell freigeben

    # Nur wenn ein Versions-Tag gepusht wird (z.B. git tag v1.0.0 && git push --tags)
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: "3.16.0"

      - name: Configure kubectl (Production)
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > ~/.kube/config

      - name: Deploy to Production
        run: |
          helm upgrade --install argus ./charts/argus \
            --namespace argus \
            -f charts/argus/values-prod.yaml \
            --set backend.image.tag=${{ github.ref_name }} \
            --set frontend.image.tag=${{ github.ref_name }} \
            --atomic \
            --timeout 10m
