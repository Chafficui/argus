# =============================================================================
# values-staging.yaml — Overrides for VPS staging (8 GB RAM / k3s)
# =============================================================================
# Real secrets are injected via --set at deploy time (from GitHub Secrets).
# This file only contains non-sensitive overrides.
# =============================================================================

global:
  imageRegistry: ""
  imagePullPolicy: Always
  imagePullSecrets:
    - name: ghcr-secret

# -- Backend ------------------------------------------------------------------
backend:
  image:
    repository: ghcr.io/chafficui/argus/backend
    tag: latest
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  env:
    LOG_LEVEL: "info"
    ENVIRONMENT: "staging"
    MILVUS_HOST: "argus-milvus"
    MILVUS_PORT: "19530"
    POSTGRES_HOST: "argus-postgresql"
    POSTGRES_PORT: "5432"
    POSTGRES_DB: "argus"
    MINIO_ENDPOINT: "argus-minio:9000"
    KEYCLOAK_URL: "http://argus-keycloak:80/auth/realms/argus"
    OLLAMA_BASE_URL: "http://argus-ollama:11434"

# -- Crawler ------------------------------------------------------------------
crawler:
  image:
    repository: ghcr.io/chafficui/argus/crawler
    tag: latest
  resources:
    requests:
      cpu: "100m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"

# -- Frontend -----------------------------------------------------------------
frontend:
  image:
    repository: ghcr.io/chafficui/argus/frontend
    tag: latest
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"

# -- Ollama -------------------------------------------------------------------
ollama:
  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "2000m"
      memory: "4Gi"
  persistence:
    size: "10Gi"

# -- Keycloak -----------------------------------------------------------------
keycloak:
  realmImport:
    enabled: true
  httpRelativePath: "/auth/"
  auth:
    adminUser: admin
    adminPassword: "CHANGE_ME_VIA_SECRET"
  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"

# -- Milvus -------------------------------------------------------------------
milvus:
  minio:
    enabled: false
    tls:
      enabled: false
  etcd:
    enabled: true
    replicaCount: 1
  pulsar:
    enabled: false
  externalS3:
    enabled: true
    host: argus-minio
    port: "9000"
    accessKey: "argus-minio"
    secretKey: "argus-minio-secret"
    useSSL: false
    bucketName: "milvus-bucket"
    rootPath: "file"
    useIAM: false
    cloudProvider: "aws"
  resources:
    requests:
      cpu: "200m"
      memory: "1Gi"
    limits:
      cpu: "1000m"
      memory: "2Gi"

# -- PostgreSQL ---------------------------------------------------------------
postgresql:
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# -- MinIO --------------------------------------------------------------------
minio:
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  persistence:
    size: "10Gi"

# -- Observability -------------------------------------------------------------
observability:
  enabled: true

kube-prometheus-stack:
  fullnameOverride: "argus-prometheus"
  grafana:
    fullnameOverride: "argus-grafana"
    assertNoLeakedSecrets: false
    adminPassword: "CHANGE_ME_VIA_SECRET"
    persistence:
      enabled: true
      size: "2Gi"
      storageClass: "local-path"
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"
    grafana.ini:
      server:
        root_url: "https://argus.codai.app/grafana/"
        serve_from_sub_path: true
      auth.generic_oauth:
        enabled: true
        name: Keycloak
        client_id: grafana
        client_secret: grafana-client-secret
        scopes: openid profile email roles
        auth_url: https://argus.codai.app/auth/realms/argus/protocol/openid-connect/auth
        token_url: http://argus-keycloak/auth/realms/argus/protocol/openid-connect/token
        api_url: http://argus-keycloak/auth/realms/argus/protocol/openid-connect/userinfo
        role_attribute_path: "contains(realm_access.roles[*], 'admin') && 'Admin' || 'Viewer'"
    additionalDataSources:
      - name: Loki
        type: loki
        url: http://argus-loki:3100
        access: proxy
        isDefault: false
  prometheus:
    prometheusSpec:
      retention: "7d"
      resources:
        requests:
          cpu: "100m"
          memory: "256Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: "local-path"
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: "5Gi"
  alertmanager:
    enabled: false

loki-stack:
  loki:
    enabled: true
    persistence:
      enabled: true
      size: "5Gi"
      storageClass: "local-path"
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"
  promtail:
    enabled: true

# -- Ingress ------------------------------------------------------------------
ingress:
  enabled: true
  className: "traefik"
  host: "argus.codai.app"
  tls:
    enabled: true
    secretName: argus-tls
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
