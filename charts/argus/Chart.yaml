apiVersion: v2
name: argus
description: |
  Argus — Enterprise AI Research Platform.
  Self-hosted, agent-based source monitoring and RAG search.
type: application
version: 0.1.0
appVersion: "0.1.0"

keywords:
  - ai
  - rag
  - llm
  - enterprise
  - on-premise

maintainers:
  - name: Felix
    email: felix@codai.app

# Dependencies: external Helm charts we reuse instead of writing ourselves.
# Think of these like npm packages — we declare them here, Helm downloads them.
dependencies:
  - name: milvus
    version: "4.2.4"
    repository: "https://zilliztech.github.io/milvus-helm"
    condition: milvus.enabled

  - name: kube-prometheus-stack
    version: "61.3.2"
    repository: "https://prometheus-community.github.io/helm-charts"
    condition: observability.enabled

  - name: loki-stack
    version: "2.10.2"
    repository: "https://grafana.github.io/helm-charts"
    condition: observability.enabled
