# =============================================================================
# secrets.yaml
# =============================================================================
# Kubernetes Secrets store sensitive data (passwords, API keys).
# They're base64-encoded (NOT encrypted by default — for real security you'd
# use Sealed Secrets or Vault, but that's advanced territory).
#
# IMPORTANT: Never put real secrets in values.yaml that gets committed to git.
# In production, you'd generate these with:
#   kubectl create secret generic argus-backend-secrets \
#     --from-literal=POSTGRES_PASSWORD=supersecret \
#     --namespace argus
#
# Here we create them via Helm for convenience in local dev.
# =============================================================================

---
# Backend secrets
apiVersion: v1
kind: Secret
metadata:
  name: argus-backend-secrets
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: argus-backend
type: Opaque
stringData:
  # stringData lets you write plain text — Helm/K8s encodes it to base64 automatically
  POSTGRES_PASSWORD: {{ .Values.postgresql.auth.password | default "argus-dev-password" | quote }}
  MINIO_ACCESS_KEY: {{ .Values.minio.auth.rootUser | default "argus-minio" | quote }}
  MINIO_SECRET_KEY: {{ .Values.minio.auth.rootPassword | default "argus-minio-secret" | quote }}
  # SECRET_KEY is used to sign JWT tokens in FastAPI
  SECRET_KEY: {{ .Values.backend.secretKey | default "dev-secret-key-change-in-prod-minimum-32-chars" | quote }}

---
# PostgreSQL secrets
apiVersion: v1
kind: Secret
metadata:
  name: argus-postgres-secret
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: argus-postgresql
type: Opaque
stringData:
  postgres-password: {{ .Values.postgresql.auth.postgresPassword | default "postgres-admin-password" | quote }}
  password: {{ .Values.postgresql.auth.password | default "argus-dev-password" | quote }}

---
# Keycloak DB secrets
apiVersion: v1
kind: Secret
metadata:
  name: argus-keycloak-db-secret
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: argus-keycloak
type: Opaque
stringData:
  password: {{ ((.Values.keycloak).externalDatabase).password | default "keycloak-dev-password" | quote }}

---
# MinIO secrets
apiVersion: v1
kind: Secret
metadata:
  name: argus-minio-secret
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: argus-minio
type: Opaque
stringData:
  root-user: {{ .Values.minio.auth.rootUser | default "argus-minio" | quote }}
  root-password: {{ .Values.minio.auth.rootPassword | default "argus-minio-secret" | quote }}
