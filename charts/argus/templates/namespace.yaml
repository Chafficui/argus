# =============================================================================
# namespace.yaml
# =============================================================================
# A Namespace is like a folder in Kubernetes.
# Everything we create will live in "argus" — separated from system pods
# (which live in "kube-system") and other applications.
#
# The {{ .Values.global.namespace }} syntax is Helm templating —
# it reads the value from values.yaml at runtime.
# =============================================================================

apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/managed-by: helm
    app.kubernetes.io/name: argus
    # This label is important for NetworkPolicies later —
    # it lets us say "allow traffic from the 'argus' namespace"
    kubernetes.io/metadata.name: {{ .Values.global.namespace }}
