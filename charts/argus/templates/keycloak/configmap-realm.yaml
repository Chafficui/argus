{{- if and .Values.keycloak.enabled .Values.keycloak.realmImport.enabled }}
{{- /*
  This ConfigMap must stay in sync with infra/keycloak/argus-realm.json.
  The CI deploy step injects it via --set-file so changes propagate automatically.
*/ -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: argus-keycloak-realm
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: argus-keycloak
    app.kubernetes.io/part-of: argus
data:
  argus-realm.json: |-
    {{ .Values.keycloak.realmJson | nindent 4 }}
{{- end }}
