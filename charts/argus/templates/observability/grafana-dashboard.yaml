{{- if .Values.observability.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: argus-grafana-dashboard
  namespace: {{ .Values.global.namespace }}
  labels:
    grafana_dashboard: "1"
data:
  argus-overview.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "Service Status",
          "type": "stat",
          "gridPos": { "h": 4, "w": 24, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum by (container) (kube_pod_container_status_running{namespace=\"argus\", container=~\"backend|crawler|frontend|keycloak|grafana|loki|milvus-standalone\"})",
              "legendFormat": "{{ "{{" }}container{{ "}}" }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "0": { "text": "Down", "color": "red" } } },
                { "type": "range", "options": { "from": 1, "to": 999, "result": { "text": "Up", "color": "green" } } }
              ],
              "thresholds": { "mode": "absolute", "steps": [ { "color": "red", "value": null }, { "color": "green", "value": 1 } ] }
            }
          },
          "options": { "colorMode": "background", "graphMode": "none", "textMode": "auto", "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "title": "CPU Usage by Service",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "targets": [
            {
              "expr": "sum by (container) (rate(container_cpu_usage_seconds_total{namespace=\"argus\", container=~\"backend|crawler|frontend|keycloak|grafana|loki|milvus-standalone|minio|ollama|postgresql\"}[5m]))",
              "legendFormat": "{{ "{{" }}container{{ "}}" }}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "cores", "custom": { "fillOpacity": 20, "lineWidth": 2, "stacking": { "mode": "none" } } } }
        },
        {
          "title": "Memory Usage by Service",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "targets": [
            {
              "expr": "sum by (container) (container_memory_working_set_bytes{namespace=\"argus\", container=~\"backend|crawler|frontend|keycloak|grafana|loki|milvus-standalone|minio|ollama|postgresql\"})",
              "legendFormat": "{{ "{{" }}container{{ "}}" }}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "bytes", "custom": { "fillOpacity": 20, "lineWidth": 2, "stacking": { "mode": "none" } } } }
        },
        {
          "title": "Pod Restarts",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "targets": [
            {
              "expr": "sum by (pod) (increase(kube_pod_container_status_restarts_total{namespace=\"argus\"}[1h]))",
              "legendFormat": "{{ "{{" }}pod{{ "}}" }}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "short", "custom": { "fillOpacity": 10, "lineWidth": 2, "drawStyle": "bars" } } }
        },
        {
          "title": "Network I/O",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "targets": [
            {
              "expr": "sum by (pod) (rate(container_network_receive_bytes_total{namespace=\"argus\"}[5m]))",
              "legendFormat": "{{ "{{" }}pod{{ "}}" }} rx"
            },
            {
              "expr": "sum by (pod) (rate(container_network_transmit_bytes_total{namespace=\"argus\"}[5m]))",
              "legendFormat": "{{ "{{" }}pod{{ "}}" }} tx"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "Bps", "custom": { "fillOpacity": 10, "lineWidth": 2 } } }
        },
        {
          "title": "Backend HTTP Requests (if metrics enabled)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 20 },
          "targets": [
            {
              "expr": "sum by (status) (rate(http_requests_total{namespace=\"argus\", job=~\".*backend.*\"}[5m]))",
              "legendFormat": "{{ "{{" }}status{{ "}}" }}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "reqps", "custom": { "fillOpacity": 20, "lineWidth": 2 } } }
        },
        {
          "title": "Persistent Volume Usage",
          "type": "gauge",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 20 },
          "targets": [
            {
              "expr": "kubelet_volume_stats_used_bytes{namespace=\"argus\"} / kubelet_volume_stats_capacity_bytes{namespace=\"argus\"}",
              "legendFormat": "{{ "{{" }}persistentvolumeclaim{{ "}}" }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0, "max": 1,
              "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "yellow", "value": 0.7 }, { "color": "red", "value": 0.9 } ] }
            }
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["argus"],
      "templating": { "list": [] },
      "time": { "from": "now-6h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Argus Overview",
      "uid": "argus-overview",
      "version": 1
    }
{{- end }}
