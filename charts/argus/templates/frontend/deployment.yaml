{{- if .Values.frontend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argus-frontend
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: argus-frontend
    app.kubernetes.io/part-of: argus
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app: argus-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: argus-frontend
        app.kubernetes.io/name: argus-frontend
    spec:
      {{- if .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.global.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
        - name: frontend
          image: {{ .Values.global.imageRegistry }}{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 80
              name: http
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: argus-frontend
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: argus-frontend
    app.kubernetes.io/part-of: argus
spec:
  selector:
    app: argus-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: ClusterIP
{{- end }}
