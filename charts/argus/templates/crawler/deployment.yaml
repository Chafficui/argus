{{- if .Values.crawler.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argus-crawler
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: argus-crawler
    app.kubernetes.io/part-of: argus
spec:
  replicas: {{ .Values.crawler.replicaCount }}
  selector:
    matchLabels:
      app: argus-crawler
  template:
    metadata:
      labels:
        app: argus-crawler
        app.kubernetes.io/name: argus-crawler
    spec:
      {{- if .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.global.imagePullSecrets | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-backend
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for backend..."
              until nc -z argus-backend 8000; do
                sleep 2
              done
              echo "Backend is ready!"
      containers:
        - name: crawler
          image: {{ .Values.global.imageRegistry }}{{ .Values.crawler.image.repository }}:{{ .Values.crawler.image.tag }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            {{- range $key, $val := .Values.crawler.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            {{- range .Values.crawler.envFromSecrets }}
            {{- $secretName := .secretName }}
            {{- range .keys }}
            - name: {{ . }}
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: {{ . }}
            {{- end }}
            {{- end }}
          resources:
            {{- toYaml .Values.crawler.resources | nindent 12 }}
{{- end }}
