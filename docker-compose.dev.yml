# =============================================================================
# docker-compose.dev.yml
# =============================================================================
# Local development stack for Argus.
# Spins up all infrastructure dependencies so you can run the backend locally.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   cd services/backend
#   uvicorn app.main:app --reload
#
# Tear down:
#   docker compose -f docker-compose.dev.yml down -v
# =============================================================================

services:
  # --------------------------------------------------------------------------
  # PostgreSQL — relational database for users, sources, documents, crawl jobs
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: argus-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: argus
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: argus-dev-password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argus -d argus"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # etcd — required by Milvus for metadata storage
  # --------------------------------------------------------------------------
  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: argus-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - etcd_data:/etcd
    command:
      - etcd
      - --advertise-client-urls=http://127.0.0.1:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # MinIO — S3-compatible object storage for raw documents and processed chunks
  # --------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: argus-minio
    ports:
      - "9000:9000"
      - "9001:9001"   # MinIO Console UI
    environment:
      MINIO_ROOT_USER: argus-minio
      MINIO_ROOT_PASSWORD: argus-minio-secret
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # Milvus Standalone — vector database for semantic search
  # Requires etcd (metadata) and minio (segment storage)
  # --------------------------------------------------------------------------
  milvus:
    image: milvusdb/milvus:v2.4.6
    container_name: argus-milvus
    ports:
      - "19530:19530"
      - "9091:9091"   # Milvus metrics
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: argus-minio
      MINIO_SECRET_ACCESS_KEY: argus-minio-secret
    volumes:
      - milvus_data:/var/lib/milvus
    command: ["milvus", "run", "standalone"]
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9091/healthz || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # --------------------------------------------------------------------------
  # Ollama — local LLM inference for embeddings and RAG answers
  # After startup, pull models:
  #   docker exec argus-ollama ollama pull nomic-embed-text
  #   docker exec argus-ollama ollama pull llama3.2
  # --------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: argus-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    dns:
      - 8.8.8.8
      - 1.1.1.1
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # SearXNG — self-hosted meta search engine for SERP source type
  # The crawler queries this to get search result URLs for monitoring
  # --------------------------------------------------------------------------
  searxng:
    image: searxng/searxng:latest
    container_name: argus-searxng
    ports:
      - "8888:8080"
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888/
    volumes:
      - ./searxng-settings.yml:/etc/searxng/settings.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  etcd_data:
  minio_data:
  milvus_data:
  ollama_data:
