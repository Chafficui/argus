# =============================================================================
# docker-compose.dev.yml
# =============================================================================
# Local development stack for Argus.
# Spins up all infrastructure dependencies so you can run the backend locally.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   cd services/backend
#   uvicorn app.main:app --reload
#
# Tear down:
#   docker compose -f docker-compose.dev.yml down -v
# =============================================================================

services:
  # --------------------------------------------------------------------------
  # Frontend — React app (Vite dev server)
  # --------------------------------------------------------------------------
  frontend:
    build:
      context: ./services/frontend
      args:
        BUILD_ENV: docker
    container_name: argus-frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  # --------------------------------------------------------------------------
  # Backend — FastAPI application
  # --------------------------------------------------------------------------
  backend:
    build:
      context: ./services/backend
    container_name: argus-backend
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: argus
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: argus-dev-password
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: argus-minio
      MINIO_SECRET_KEY: argus-minio-secret
      OLLAMA_BASE_URL: http://ollama:11434
      KEYCLOAK_URL: http://keycloak:8080/realms/argus
      ENVIRONMENT: development
      DEV_AUTH_BYPASS: "true"
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      milvus:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # --------------------------------------------------------------------------
  # Crawler — Playwright-based web scraper
  # --------------------------------------------------------------------------
  crawler:
    build:
      context: ./services/crawler
    container_name: argus-crawler
    environment:
      BACKEND_URL: http://backend:8000
      API_TOKEN: dev
      SEARXNG_URL: http://searxng:8080
      CRAWL_INTERVAL_SECONDS: 21600
      POLL_INTERVAL_SECONDS: 60
      LOG_LEVEL: info
    depends_on:
      backend:
        condition: service_healthy
      searxng:
        condition: service_healthy

  # --------------------------------------------------------------------------
  # PostgreSQL — relational database for users, sources, documents, crawl jobs
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: argus-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: argus
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: argus-dev-password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argus -d argus"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # etcd — required by Milvus for metadata storage
  # --------------------------------------------------------------------------
  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: argus-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - etcd_data:/etcd
    command:
      - etcd
      - --advertise-client-urls=http://127.0.0.1:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # MinIO — S3-compatible object storage for raw documents and processed chunks
  # --------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: argus-minio
    ports:
      - "9000:9000"
      - "9001:9001"   # MinIO Console UI
    environment:
      MINIO_ROOT_USER: argus-minio
      MINIO_ROOT_PASSWORD: argus-minio-secret
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # Milvus Standalone — vector database for semantic search
  # Requires etcd (metadata) and minio (segment storage)
  # --------------------------------------------------------------------------
  milvus:
    image: milvusdb/milvus:v2.4.6
    container_name: argus-milvus
    ports:
      - "19530:19530"
      - "9091:9091"   # Milvus metrics
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: argus-minio
      MINIO_SECRET_ACCESS_KEY: argus-minio-secret
    volumes:
      - milvus_data:/var/lib/milvus
    command: ["milvus", "run", "standalone"]
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9091/healthz || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # --------------------------------------------------------------------------
  # Ollama — local LLM inference for embeddings and RAG answers
  # After startup, pull models:
  #   docker exec argus-ollama ollama pull nomic-embed-text
  #   docker exec argus-ollama ollama pull llama3.2
  # --------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: argus-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    dns:
      - 8.8.8.8
      - 1.1.1.1
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # SearXNG — self-hosted meta search engine for SERP source type
  # The crawler queries this to get search result URLs for monitoring
  # --------------------------------------------------------------------------
  searxng:
    image: searxng/searxng:latest
    container_name: argus-searxng
    ports:
      - "8888:8080"
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888/
    volumes:
      - ./searxng-settings.yml:/etc/searxng/settings.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # Keycloak — OIDC identity provider
  # Login: admin / admin | Test user: demo / demo
  # --------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: argus-keycloak
    ports:
      - "8081:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    command:
      - start-dev
      - --import-realm
      - --health-enabled=true
    volumes:
      - ./infra/keycloak/argus-realm.json:/opt/keycloak/data/import/argus-realm.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # --------------------------------------------------------------------------
  # Prometheus — metrics collection and time-series storage
  # Scrapes /metrics from the backend every 15s
  # --------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: argus-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # Grafana — dashboards and visualization for metrics and logs
  # Login: admin / admin
  # --------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: argus-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_GENERIC_OAUTH_ENABLED=true
      - GF_AUTH_GENERIC_OAUTH_NAME=Keycloak
      - GF_AUTH_GENERIC_OAUTH_CLIENT_ID=grafana
      - GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET=grafana-client-secret
      - GF_AUTH_GENERIC_OAUTH_SCOPES=openid profile email roles
      - GF_AUTH_GENERIC_OAUTH_AUTH_URL=http://localhost:8081/auth/realms/argus/protocol/openid-connect/auth
      - GF_AUTH_GENERIC_OAUTH_TOKEN_URL=http://argus-keycloak:8080/auth/realms/argus/protocol/openid-connect/token
      - GF_AUTH_GENERIC_OAUTH_API_URL=http://argus-keycloak:8080/auth/realms/argus/protocol/openid-connect/userinfo
      - GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH=contains(realm_access.roles[*], 'admin') && 'Admin' || 'Viewer'
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy

  # --------------------------------------------------------------------------
  # Loki — log aggregation backend, queried by Grafana
  # --------------------------------------------------------------------------
  loki:
    image: grafana/loki:latest
    container_name: argus-loki
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
    healthcheck:
      # Loki distroless image has no shell/curl/wget — use TCP port check
      test: ["CMD", "/usr/bin/loki", "-config.file=/etc/loki/local-config.yaml", "-verify-config"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s

  # --------------------------------------------------------------------------
  # Promtail — ships Docker container logs to Loki
  # --------------------------------------------------------------------------
  promtail:
    image: grafana/promtail:latest
    container_name: argus-promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/promtail.yml:/etc/promtail/config.yml:ro
    depends_on:
      loki:
        condition: service_healthy

volumes:
  postgres_data:
  etcd_data:
  minio_data:
  milvus_data:
  ollama_data:
  prometheus_data:
  grafana_data:
  loki_data:
